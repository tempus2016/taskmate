name: Bug Report
description: Report a bug or unexpected behaviour in TaskMate
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees:
  - tempus2016

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible — it helps fix issues faster.
        
        Before submitting, please check the [Troubleshooting wiki](https://github.com/tempus2016/taskmate/wiki/Troubleshooting) to see if your issue is already covered.

  # ── Environment ──────────────────────────────────────────────────────────────

  - type: input
    id: taskmate_version
    attributes:
      label: TaskMate Version
      description: Found in Settings → Devices & Services → TaskMate
      placeholder: e.g. 1.1.3
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: Found in Settings → System → About
      placeholder: e.g. 2026.3.1
    validations:
      required: true

  - type: dropdown
    id: ha_install_type
    attributes:
      label: Home Assistant Installation Type
      options:
        - Home Assistant OS (HAOS)
        - Home Assistant Supervised
        - Home Assistant Container (Docker)
        - Home Assistant Core
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: TaskMate Installation Method
      options:
        - HACS (custom repository)
        - Manual (copied files)
    validations:
      required: true

  - type: dropdown
    id: lovelace_mode
    attributes:
      label: Lovelace Mode
      description: Found in Settings → Dashboards → ⋮ menu → Edit → Manage Resources
      options:
        - Storage (default — managed via UI)
        - YAML (configuration.yaml)
        - Not sure
    validations:
      required: true

  # ── Bug Description ───────────────────────────────────────────────────────────

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug. What did you see?
      placeholder: |
        e.g. When I tap a chore on the child card, the chore appears to complete but the points balance doesn't update.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: |
        e.g. The points balance should increase immediately after completing the chore.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this? Be as specific as possible.
      placeholder: |
        1. Open the child card for [child name]
        2. Tap the chore row for [chore name]
        3. The chore shows as ticked
        4. Points balance does not change
    validations:
      required: true

  - type: dropdown
    id: reproducible
    attributes:
      label: Is this reproducible?
      options:
        - Always — happens every time
        - Sometimes — happens intermittently
        - Once — only happened one time
    validations:
      required: true

  # ── Affected Area ─────────────────────────────────────────────────────────────

  - type: dropdown
    id: affected_area
    attributes:
      label: Affected Area
      description: Which part of TaskMate is affected? Select all that apply.
      multiple: true
      options:
        - Child Card
        - Rewards Card
        - Approvals Card
        - Points Card
        - Reorder Card
        - Parent Dashboard Card
        - Overview Card
        - Activity Card
        - Streak Card
        - Weekly Card
        - Points Graph Card
        - Reward Progress Card
        - Leaderboard Card
        - Integration setup / config flow
        - Chore management
        - Reward management
        - Children management
        - Points / scoring
        - Streaks / milestones
        - Reward approval flow
        - Chore approval flow
        - Services (complete_chore, add_points, etc.)
        - Sensors / entity attributes
        - Lovelace resources (cards not loading)
        - Bonus points (weekend / streak / perfect week)
        - Other
    validations:
      required: true

  # ── Sensor & Entity State ─────────────────────────────────────────────────────

  - type: textarea
    id: entity_state
    attributes:
      label: Sensor State (if relevant)
      description: |
        If the bug involves incorrect data, paste the relevant attributes from Developer Tools → States → sensor.taskmate_overview.
        You can copy the attributes as JSON from the state card.
      render: json
      placeholder: |
        {
          "total_children": 1,
          "children": [...],
          "pending_approvals": 0
        }

  # ── Logs ─────────────────────────────────────────────────────────────────────

  - type: textarea
    id: logs
    attributes:
      label: Home Assistant Logs
      description: |
        Paste any relevant log output here. 
        
        To get debug logs, add this to configuration.yaml, restart HA, reproduce the issue, then copy the logs from Settings → System → Logs:
        ```yaml
        logger:
          logs:
            custom_components.taskmate: debug
        ```
        
        Filter by "taskmate" to find relevant entries.
      render: text
      placeholder: |
        2026-03-23 10:15:00 ERROR (MainThread) [custom_components.taskmate] ...

  # ── Browser Console Errors ────────────────────────────────────────────────────

  - type: textarea
    id: console_errors
    attributes:
      label: Browser Console Errors (for card issues)
      description: |
        If the bug is with a Lovelace card, open browser DevTools (F12) → Console tab, reproduce the issue, and paste any red errors here.
        Filter by "taskmate" to find relevant entries.
      render: text
      placeholder: |
        Uncaught TypeError: Cannot read properties of undefined ...
        at taskmate-child-card.js:355

  # ── Additional Context ────────────────────────────────────────────────────────

  - type: textarea
    id: config
    attributes:
      label: Card YAML Configuration (for card issues)
      description: Paste the YAML configuration of the affected card.
      render: yaml
      placeholder: |
        type: custom:taskmate-child-card
        entity: sensor.taskmate_overview
        child_id: a8c8376a
        time_category: anytime

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: |
        Anything else that might be relevant — screenshots, screen recordings, recent changes to your setup, etc.
        
        You can drag and drop images directly into this text box.

  - type: checkboxes
    id: checklist
    attributes:
      label: Before Submitting
      options:
        - label: I have checked the [Troubleshooting wiki](https://github.com/tempus2016/taskmate/wiki/Troubleshooting) and my issue is not covered there
          required: true
        - label: I have searched [existing issues](https://github.com/tempus2016/taskmate/issues) and this is not a duplicate
          required: true
        - label: I am running the latest version of TaskMate
          required: false
